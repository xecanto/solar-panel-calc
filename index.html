<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Solar Panel Array Planner</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox Styles & Scripts -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    
    <!-- Turf.js for Geospatial Calculations -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <!-- Mapbox Draw Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.css" type="text/css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 p-0">

<div id="map" class="absolute top-0 bottom-0 w-full"></div>

<!-- Area Display Box -->
<div class="absolute bottom-10 left-3 bg-white bg-opacity-90 p-4 w-72 rounded-lg shadow-md">
    <p class="text-gray-700 text-sm mb-2">Click the map to draw a polygon.</p>
    <div id="calculated-area" class="font-semibold"></div>
    <div id="panel-count" class="mt-2 text-sm text-gray-600"></div>
</div>

<!-- Buttons for functionalities -->
<div class="absolute top-3 left-3 bg-white p-4 rounded-lg shadow-md z-10">
    <button id="subtract-area" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded mb-2 w-full">
        Subtract Inner Polygon
    </button>
    <button id="autofill" class="bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded w-full">
        Autofill with Panel Arrays
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
